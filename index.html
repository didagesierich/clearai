<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ClearAI</title>

<style>
body{
background:#0b0f18;
color:white;
font-family:system-ui;
padding:40px;
}

textarea{
width:100%;
height:200px;
background:#0f1625;
color:white;
border:1px solid #2b3b55;
padding:12px;
border-radius:8px;
}

button{
margin-top:10px;
padding:10px 20px;
background:#d94c5f;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

pre{
background:#0f1625;
padding:20px;
margin-top:20px;
border-radius:8px;
}
</style>

</head>

<body>

<h1>ClearAI</h1>

<textarea id="text"></textarea>

<br>

<button onclick="scan()">Analyze</button>

<pre id="result"></pre>

<script>

async function scan(){

const text=document.getElementById("text").value

const r=await fetch("/.netlify/functions/analyze",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({text})
})

const data = await r.json()

let output

try {
  const content = data.choices[0].message.content
  output = JSON.parse(content)
} catch {
  output = data
}

document.getElementById("result").textContent =
JSON.stringify(output, null, 2)
  
}

</script>

</body>
</html>
